<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: transparent;
    color: #eee;
  }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    justify-content: center;
  }

  .filter-btn {
    background: transparent;
    color: #666;
    border: 1px solid #333;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .filter-btn:hover { color: #aaa; border-color: #555; }
  .filter-btn.active { color: #fff; border-color: #fff; background: transparent; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
  }

  .card {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    background: #111;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.6); }
  .card:hover .overlay { opacity: 1; }

  .card img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
    opacity: 0;
    transition: opacity 0.25s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 12px 10px;
  }

  .overlay-title {
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .overlay-year {
    font-size: 9px;
    color: #888;
    margin-bottom: 4px;
  }

  .overlay-role {
    font-size: 9px;
    color: #7eb8f7;
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .overlay-link {
    font-size: 9px;
    color: #f5c518;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.05em;
  }

  .overlay-link:hover { text-decoration: underline; }

  .no-poster {
    width: 100%;
    aspect-ratio: 2/3;
    background: #161616;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #333;
    text-align: center;
    padding: 10px;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
  }
</style>

<body>

let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = currentFilter === 'all'
    ? CREDITS
    : CREDITS.filter(c => c.type.includes(currentFilter));

  document.getElementById('grid').innerHTML = list.map(c => `
    <div class="card" onclick="window.open('${c.imdbUrl}','_blank')">
      ${c.poster
        ? `<img src="${c.poster}" alt="${c.title.replace(/"/g, '')}" loading="lazy">`
        : `<div class="no-poster">${c.title}</div>`}
      <div class="overlay">
        <div class="overlay-title">${c.title}</div>
        <div class="overlay-year">${c.year} · ${c.type}</div>
        <div class="overlay-role">${c.role}</div>
        <span class="overlay-link">IMDB ↗</span>
      </div>
    </div>
  `).join('');
}

render();
